name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/kube-foundry/kube-foundry

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: operator
            dockerfile: Dockerfile
            context: .
          - image: webhook
            dockerfile: webhook/Dockerfile
            context: .
          - image: agent-claude-code
            dockerfile: agent-images/claude-code/Dockerfile
            context: agent-images/claude-code
          - image: agent-codex
            dockerfile: agent-images/codex/Dockerfile
            context: agent-images/codex
          - image: agent-open-code
            dockerfile: agent-images/open-code/Dockerfile
            context: agent-images/open-code
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.ref_name }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-push:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Chart.yaml version and image tags
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" chart/kube-foundry/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" chart/kube-foundry/Chart.yaml
          sed -i "s/tag: latest/tag: ${{ github.ref_name }}/g" chart/kube-foundry/values.yaml

      - name: Package chart
        run: helm package chart/kube-foundry

      - name: Push chart to GHCR
        run: helm push kube-foundry-${{ steps.version.outputs.version }}.tgz oci://${{ env.REGISTRY }}/kube-foundry/kube-foundry

  release:
    runs-on: ubuntu-latest
    needs: [build-and-push, helm-push]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
