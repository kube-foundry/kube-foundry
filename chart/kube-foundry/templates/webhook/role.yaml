{{- if .Values.webhook.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kube-foundry.fullname" . }}-webhook
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kube-foundry.labels" . | nindent 4 }}
rules:
  - apiGroups: ["factory.factory.io"]
    resources: ["softwaretasks"]
    verbs: ["create", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kube-foundry.fullname" . }}-webhook
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kube-foundry.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kube-foundry.fullname" . }}-webhook
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-foundry.fullname" . }}-webhook
    namespace: {{ .Values.namespace }}
{{- end }}
