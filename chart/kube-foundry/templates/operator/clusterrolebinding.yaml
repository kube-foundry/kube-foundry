apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-foundry.fullname" . }}-operator
  labels:
    {{- include "kube-foundry.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kube-foundry.fullname" . }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-foundry.fullname" . }}-operator
    namespace: {{ .Values.namespace }}
