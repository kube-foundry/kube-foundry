apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-foundry.fullname" . }}-operator
  labels:
    {{- include "kube-foundry.labels" . | nindent 4 }}
rules:
  - apiGroups: ["factory.factory.io"]
    resources: ["softwaretasks"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["factory.factory.io"]
    resources: ["softwaretasks/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["factory.factory.io"]
    resources: ["softwaretasks/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
