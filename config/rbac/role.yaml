---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - create
  - delete
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  verbs:
  - create
  - get
  - list
  - watch
- apiGroups:
  - factory.factory.io
  resources:
  - skills
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - factory.factory.io
  resources:
  - softwaretasks
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - factory.factory.io
  resources:
  - softwaretasks/finalizers
  verbs:
  - update
- apiGroups:
  - factory.factory.io
  resources:
  - softwaretasks/status
  verbs:
  - get
  - patch
  - update
