# This rule is not used by the project kube-foundry itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the factory.factory.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kube-foundry
    app.kubernetes.io/managed-by: kustomize
  name: softwaretask-editor-role
rules:
- apiGroups:
  - factory.factory.io
  resources:
  - softwaretasks
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - factory.factory.io
  resources:
  - softwaretasks/status
  verbs:
  - get
