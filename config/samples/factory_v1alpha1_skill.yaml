apiVersion: factory.factory.io/v1alpha1
kind: Skill
metadata:
  name: go-expert
  labels:
    app.kubernetes.io/name: kube-foundry
spec:
  description: "Go development best practices and project setup"
  files:
    - path: CLAUDE.md
      content: |
        You are an expert Go developer. Follow these conventions:
        - Use Go 1.25+ idioms
        - Always run `go vet ./...` and `golangci-lint run` before committing
        - Write table-driven tests
        - Use structured logging with slog
        - Handle errors explicitly, never ignore them
    - path: .golangci.yml
      content: |
        linters:
          enable:
            - govet
            - errcheck
            - staticcheck
            - gosimple
            - unused
  env:
    - name: GOFLAGS
      value: "-count=1"
  init:
    - "go mod download"
