kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: softwaretasks.factory.factory.io
spec:
  group: factory.factory.io
  names:
    kind: SoftwareTask
    listKind: SoftwareTaskList
    plural: softwaretasks
    shortNames:
    - st
    singular: softwaretask
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.agent
      name: Agent
      type: string
    - jsonPath: .spec.repo
      name: Repo
      type: string
    - jsonPath: .metadata.creationTimestamp
