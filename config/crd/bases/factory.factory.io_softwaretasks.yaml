                    description: memory limit for the sandbox pod (e.g., "4Gi").
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  timeoutMinutes:
                    default: 30
                    description: timeoutMinutes is the maximum execution time before
                      the task is killed.
                    format: int32
                    maximum: 120
                    minimum: 1
                    type: integer
                type: object
              skills:
                description: |-
                  skills is a list of Skill resource names to load into the agent sandbox.
                  Skills provide files, environment variables, and init commands.
                items:
                  type: string
                type: array
              task:
                description: task is the natural-language description of the work
                  to perform.
                minLength: 1
                type: string
            required:
            - credentials
            - repo
            - task
            type: object
          status:
            description: SoftwareTaskStatus defines the observed state of SoftwareTask.
            properties:
              completionTime:
                description: completionTime is when the task finished (success or
                  failure).
                format: date-time
                type: string
              conditions:
                description: conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              message:
                description: message provides human-readable status information.
                type: string
              phase:
                default: Pending
                description: phase is the current lifecycle phase of the task.
                enum:
                - Pending
                - Running
                - Completed
                - Failed
                type: string
              podName:
                description: podName is the name of the sandbox pod created for this
                  task.
                type: string
              pullRequestURL:
                description: pullRequestURL is the URL of the created PR, if successful.
                type: string
              retryCount:
                description: retryCount tracks how many retries have been attempted.
                format: int32
                type: integer
              startTime:
                description: startTime is when the sandbox pod was created.
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
