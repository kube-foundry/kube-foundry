                        - name
                        type: object
                      type: array
                    name:
                      description: name is the identifier for this MCP server.
                      minLength: 1
                      type: string
                    url:
                      description: |-
                        url is the endpoint for a remote MCP server (streamable HTTP or SSE).
                        Mutually exclusive with command.
                      type: string
                  required:
                  - name
                  type: object
                type: array
              repo:
                description: repo is the HTTPS URL of the git repository.
                pattern: ^https://.*
                type: string
              resources:
                description: resources defines resource limits for the sandbox pod.
                properties:
                  cpu:
                    anyOf:
                    - type: integer
                    - type: string
                    default: "2"
                    description: cpu limit for the sandbox pod (e.g., "2").
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
