      priority: 1
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SoftwareTask is the Schema for the softwaretasks API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SoftwareTaskSpec defines the desired state of SoftwareTask.
            properties:
              agent:
                default: claude-code
                description: agent selects the agent runtime to use.
                enum:
                - claude-code
                - codex
                - open-code
                type: string
              branch:
                default: main
                description: branch is the base branch to clone and work from.
                type: string
              callbackURL:
                description: |-
                  callbackURL is an optional URL that receives a POST when the task completes or fails.
                  The payload includes taskName, status, pullRequestURL, and message.
                type: string
              credentials:
                description: |-
                  credentials references the Kubernetes Secret and/or inline tokens for authentication.
                  Provide either secretRef (pointing to a Secret with GITHUB_TOKEN and the agent API key),
                  or githubToken (inline) with the agent API key in the Secret, or both.
                properties:
                  githubToken:
                    description: |-
                      githubToken is an inline GitHub token for this specific task.
                      If provided, this takes precedence over GITHUB_TOKEN in the referenced secret.
                    type: string
                  secretRef:
                    description: |-
                      secretRef is the name of the Secret in the same namespace.
                      Required if githubToken is not provided (the secret must contain GITHUB_TOKEN).
                      Always required for the agent API key (ANTHROPIC_API_KEY or OPENAI_API_KEY).
                    type: string
                type: object
              gitAuthorEmail:
                description: gitAuthorEmail is the email used for git commits made
                  by the agent.
                type: string
              gitAuthorName:
                description: gitAuthorName is the name used for git commits made by
                  the agent.
                type: string
              maxRetries:
                default: 1
                description: maxRetries is the maximum number of retry attempts on
                  failure.
                format: int32
                maximum: 5
                minimum: 0
                type: integer
              mcpServers:
                description: |-
                  mcpServers defines task-specific MCP servers made available to the agent.
                  These are merged with any MCP servers defined in referenced skills.
                items:
                  description: |-
                    MCPServer defines an MCP server to connect to the agent.
                    The transport is inferred from the fields set:
                      - url → remote (streamable HTTP or SSE)
                      - command → stdio (agent spawns the process)
                  properties:
                    args:
                      description: |-
                        args are arguments passed to the command.
                        Only used when command is set.
                      items:
                        type: string
                      type: array
                    command:
                      description: |-
                        command is the program to spawn for a stdio-based MCP server.
                        Mutually exclusive with url.
                      type: string
                    env:
                      description: |-
                        env are environment variables set for the MCP server process (stdio)
                        or sent as context to a remote server.
                      items:
                        description: EnvVar represents an environment variable present
                          in a Container.
                        properties:
                          name:
                            description: |-
                              Name of the environment variable.
                              May consist of any printable ASCII characters except '='.
                            type: string
                          value:
                            description: |-
                              Variable references $(VAR_NAME) are expanded
                              using the previously defined environment variables in the container and
                              any service environment variables. If a variable cannot be resolved,
                              the reference in the input string will be unchanged. Double $$ are reduced
                              to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                              "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                              Escaped references will never be expanded, regardless of whether the variable
                              exists or not.
                              Defaults to "".
                            type: string
                          valueFrom:
                            description: Source for the environment variable's value.
                              Cannot be used if value is not empty.
                            properties:
                              configMapKeyRef:
                                description: Selects a key of a ConfigMap.
                                properties:
                                  key:
                                    description: The key to select.
                                    type: string
                                  name:
                                    default: ""
                                    description: |-
                                      Name of the referent.
                                      This field is effectively required, but due to backwards compatibility is
                                      allowed to be empty. Instances of this type with an empty value here are
                                      almost certainly wrong.
                                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                    type: string
                                  optional:
                                    description: Specify whether the ConfigMap or
                                      its key must be defined
                                    type: boolean
                                required:
                                - key
                                type: object
                                x-kubernetes-map-type: atomic
                              fieldRef:
                                description: |-
                                  Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                                  spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                                properties:
                                  apiVersion:
                                    description: Version of the schema the FieldPath
                                      is written in terms of, defaults to "v1".
                                    type: string
                                  fieldPath:
                                    description: Path of the field to select in the
                                      specified API version.
                                    type: string
                                required:
                                - fieldPath
                                type: object
                                x-kubernetes-map-type: atomic
                              fileKeyRef:
                                description: |-
                                  FileKeyRef selects a key of the env file.
                                  Requires the EnvFiles feature gate to be enabled.
                                properties:
                                  key:
                                    description: |-
                                      The key within the env file. An invalid key will prevent the pod from starting.
                                      The keys defined within a source may consist of any printable ASCII characters except '='.
                                      During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
                                    type: string
                                  optional:
                                    default: false
                                    description: |-
                                      Specify whether the file or its key must be defined. If the file or key
                                      does not exist, then the env var is not published.
                                      If optional is set to true and the specified key does not exist,
                                      the environment variable will not be set in the Pod's containers.

                                      If optional is set to false and the specified key does not exist,
                                      an error will be returned during Pod creation.
                                    type: boolean
                                  path:
                                    description: |-
                                      The path within the volume from which to select the file.
                                      Must be relative and may not contain the '..' path or start with '..'.
                                    type: string
                                  volumeName:
                                    description: The name of the volume mount containing
                                      the env file.
                                    type: string
                                required:
                                - key
                                - path
                                - volumeName
                                type: object
                                x-kubernetes-map-type: atomic
                              resourceFieldRef:
                                description: |-
                                  Selects a resource of the container: only resources limits and requests
                                  (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
                                properties:
                                  containerName:
                                    description: 'Container name: required for volumes,
                                      optional for env vars'
                                    type: string
                                  divisor:
                                    anyOf:
                                    - type: integer
                                    - type: string
                                    description: Specifies the output format of the
                                      exposed resources, defaults to "1"
                                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                    x-kubernetes-int-or-string: true
                                  resource:
                                    description: 'Required: resource to select'
                                    type: string
                                required:
                                - resource
                                type: object
                                x-kubernetes-map-type: atomic
                              secretKeyRef:
                                description: Selects a key of a secret in the pod's
                                  namespace
                                properties:
                                  key:
                                    description: The key of the secret to select from.  Must
                                      be a valid secret key.
                                    type: string
                                  name:
                                    default: ""
                                    description: |-
                                      Name of the referent.
                                      This field is effectively required, but due to backwards compatibility is
                                      allowed to be empty. Instances of this type with an empty value here are
                                      almost certainly wrong.
                                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                    type: string
                                  optional:
                                    description: Specify whether the Secret or its
                                      key must be defined
                                    type: boolean
                                required:
                                - key
                                type: object
                                x-kubernetes-map-type: atomic
                            type: object
                        required:
                        - name
                        type: object
                      type: array
                    headers:
                      description: |-
                        headers are HTTP headers sent with requests to a remote MCP server.
                        Only used when url is set.
                      items:
                        description: MCPHeader defines an HTTP header for remote MCP
                          server connections.
                        properties:
                          name:
                            description: name is the header name (e.g., "Authorization").
                            type: string
                          value:
                            description: value is the header value. Mutually exclusive
                              with valueFrom.
                            type: string
                          valueFrom:
                            description: |-
                              valueFrom references a secret key for the header value.
                              Mutually exclusive with value.
                            properties:
                              key:
                                description: The key of the secret to select from.  Must
                                  be a valid secret key.
                                type: string
                              name:
                                default: ""
                                description: |-
                                  Name of the referent.
                                  This field is effectively required, but due to backwards compatibility is
                                  allowed to be empty. Instances of this type with an empty value here are
                                  almost certainly wrong.
                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                type: string
                              optional:
                                description: Specify whether the Secret or its key
                                  must be defined
                                type: boolean
